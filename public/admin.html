<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - StudentSpace</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link href="css/admin.css" rel="stylesheet" />
</head>
<body>
  <div class="app" id="app">
    <div class="sidebar" id="sidebar">
      <h2>MyStudentSpace</h2>

      <div class="menu">
        <a class="active">DASHBOARD</a>
        <div class="menu-title">ACADEMIC</div>
        <div class="menu-title">COMMUNICATION</div>
        <div class="menu-title">SETTINGS</div>
        <div class="menu-title">ACCOUNT</div>
        <a href="#" style="color: #e02424;"><i class="bx bx-log-out"></i> Log Out</a>
      </div>
    </div>
    <div class="main">
      <div class="header admin-header">
        <div class="header-left">
          <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
          <h3 class="page-title">Dashboard Overview</h3>
        </div>

        <div class="user-profile">
          <div class="avatar" id="avatarLetter">A</div>
          <span id="teacher-name">Admin</span>
        </div>
      </div>

      <div class="dashboard admin-dashboard">
        <div class="cards admin-cards">
          <div class="card">
            <span>Class Number</span>
            <h2>G-46</h2>
          </div>
          <div class="card">
            <span>Total Students</span>
            <h2>79</h2>
          </div>
          <div class="card">
            <span>Present Today</span>
            <h2>73</h2>
          </div>
        </div>
        <div class="panel quick-actions-panel">
          <h3 class="quick-actions-title"><i class="bx bx-bolt-circle quick-actions-icon"></i> Quick Actions:</h3>
          <button class="btn-primary btn-outline"><i class="bx bx-export"></i> Export Data</button>
          <button class="btn-primary btn-outline"><i class="bx bxs-file-pdf"></i> Generate Reports</button>
          <button class="btn-primary btn-outline"><i class="bx bx-mail-send"></i> Send Mass Email</button>
        </div>
        <div class="panel-column">
          <div class="panel">
            <h3 class="panel-title"><i class="bx bx-edit"></i> Update Student Attendance</h3>
            <form class="admin-form">
              <div class="input-group">
                <label>Roll No.</label>
                <input type="text" placeholder="e.g. 2410991138" />
              </div>
              <div class="input-group">
  <label>Subjects</label>
  <select id="subjectselect" class="subject-select">
    <option value="">Select Subject</option>
    <option value="DBMS">DBMS</option>
    <option value="OOSE">OOSE</option>
    <option value="CN">Computer Networks</option>
    <option value="AI">Artificial Intelligence</option>
    <option value="JAVA">Java</option>
  </select>
</div>
              <div class="input-group">
                <label>Attendance</label>
                <input type="number" placeholder="75%" />
              </div>
              <button type="submit" class="btn-primary">
                <i class="bx bx-save"></i> Update Database
              </button>
            </form>
          </div>

        </div>

        <div class="panel-column">
          <div class="panel">
            <div class="panel-header">
              <h3 class="panel-title"><i class="bx bx-line-chart"></i> Attendance Analytics</h3>
              <select class="filter-select">
                <option value="weekly">This Week</option>
                <option value="monthly">This Month</option>
                <option value="semester">This Semester</option>
              </select>
            </div>
            <div style="position: relative; height: 280px; width: 100%;">
              <canvas id="attendanceChart"></canvas>
            </div>
          </div>
         
    <script>
      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("hide");
        document.getElementById("app").classList.toggle("hide-sidebar");
      }
      const ctx = document.getElementById('attendanceChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Week 1', 'Week 2', 'Week 3', 'Week 4', 'Week 5', 'Week 6'],
          datasets: [{
            label: 'Average Attendance %',
            data: [82, 85, 84, 88, 87, 89],
            borderColor: '#7fb2d4',
            backgroundColor: 'rgba(127, 178, 212, 0.1)',
            borderWidth: 3,
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: false,
              min: 60,
              max: 100
            }
          }
        }
      });
    </script>
    <script>

const user = JSON.parse(localStorage.getItem("loggedUser"));

if(user){
let firstName = user.name.split(" ")[0];
document.getElementById("teacher-name").innerText = firstName;
document.getElementById("avatarLetter").innerText = firstName.charAt(0).toUpperCase();
}
</script>
</body>

</html>
